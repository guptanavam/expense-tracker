<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Expense Tracker</span>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/expenses" class="btn btn-outline-light btn-sm">All Expenses</a>
        </div>
    </div>
</nav>
    <div class="container mt-5">
        <h1 class="mb-4">Add an Expense</h1>

        <form method="POST" action="/add">
            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" class="form-control" name="description" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount (₹)</label>
                <input type="number" class="form-control" name="amount" step="0.01" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="category">
                    <option value="food">Food</option>
                    <option value="travel">Travel</option>
                    <option value="shopping">Shopping</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Add Expense</button>
            <a href="/expenses" class="btn btn-outline-secondary">View All Expenses</a>
        </form>
    </div>
</body>
</html>
