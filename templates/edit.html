<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Edit Expense</h1>

        <form method="POST" action="/update/{{ expense.id }}">
            <div class="mb-3">
                <label class="form-label">Description</label>
                <input type="text" class="form-control" name="description" value="{{ expense.description }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Amount (₹)</label>
                <input type="number" class="form-control" name="amount" step="0.01" value="{{ expense.amount }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="category">
                    <option value="food" {% if expense.category == 'food' %}selected{% endif %}>Food</option>
                    <option value="travel" {% if expense.category == 'travel' %}selected{% endif %}>Travel</option>
                    <option value="shopping" {% if expense.category == 'shopping' %}selected{% endif %}>Shopping</option>
                    <option value="other" {% if expense.category == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/expenses" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>
