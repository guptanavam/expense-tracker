<!DOCTYPE html>
<html>
<head>
    <title>All Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Expense Tracker</span>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/expenses" class="btn btn-outline-light btn-sm">All Expenses</a>
        </div>
    </div>
</nav>
    <div class="container mt-5">
        <h1 class="mb-4">All Expenses</h1>
        <a href="/" class="btn btn-outline-primary mb-3">Add New Expense</a>

        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody>
                {% for expense in expenses %}
                <tr>
                    <td>{{ expense.description }}</td>
                    <td>₹{{ expense.amount }}</td>
                    <td>{{ expense.category }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <h4>Total Spent: ₹{{ total }}</h4>
    </div>
</body>
</html>
